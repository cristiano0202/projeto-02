<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | EcoWatt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/85 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="flex items-center gap-3 font-black text-xl">
        <span class="brand-mark">EW</span>
        <span>EcoWatt</span>
      </a>

      <nav class="desktop-nav flex items-center gap-6 text-sm font-bold text-slate-600">
        <a href="index.html#beneficios">Beneficios</a>
        <a href="index.html#publico">Publico</a>
        <a href="calculadora.html">Calculo de Consumo</a>
        <a href="dashboard.html" data-auth-only>Painel</a>
      </nav>

      <div class="flex items-center gap-2">
        <a href="cadastro.html" class="btn btn-primary">Criar conta</a>
      </div>
    </div>
  </header>

  <main class="mx-auto grid min-h-[78vh] max-w-6xl items-center px-4 py-12 sm:px-6 lg:px-8">
    <section class="mx-auto w-full max-w-md card p-7">
      <h1 class="text-3xl font-black">Entrar</h1>
      <p class="mt-2 text-slate-600">Acesse seu painel de energia.</p>

      <form class="mt-6 space-y-4" data-login-form>
        <div>
          <label class="field-label" for="email">E-mail</label>
          <input class="field" id="email" name="email" type="email" required>
        </div>

        <div>
          <label class="field-label" for="password">Senha</label>
          <input class="field" id="password" name="password" type="password" required>
        </div>

        <button class="btn btn-primary w-full" type="submit">Entrar</button>
      </form>

      <div class="mt-5 flex flex-col gap-2 text-sm font-bold text-slate-600">
        <a href="cadastro.html">Criar cadastro</a>
        <a href="index.html">Voltar ao inicio</a>
      </div>
    </section>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/calculator.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
